- name: "[username/password] Ensure that lxml is installed"
  ansible.builtin.pip:
    name: lxml

- name: "[username/password] Get zone info"
  community.dns.hosttech_dns_zone_info:
    zone_name: '{{ test_zone }}'
    hosttech_username: '{{ hosttech_username }}'
    hosttech_password: '{{ hosttech_password }}'
  register: result_zone

- name: "[username/password] Get zone info by ID"
  community.dns.hosttech_dns_zone_info:
    zone_id: '{{ result_zone.zone_id }}'
    hosttech_username: '{{ hosttech_username }}'
    hosttech_password: '{{ hosttech_password }}'
  register: result_zone_id

- name: "[username/password] Get all NS records"
  community.dns.hosttech_dns_record_set_info:
    zone_name: '{{ test_zone }}'
    record: '{{ test_zone }}'
    type: NS
    hosttech_username: '{{ hosttech_username }}'
    hosttech_password: '{{ hosttech_password }}'
  register: result

- name: "[username/password] Output all records"
  ansible.builtin.debug:
    var: result

- name: "[username/password] Check results"
  ansible.builtin.assert:
    that:
      - result_zone == result_zone_id
      - result_zone.zone_name == test_zone
      - result_zone.zone_id == result.zone_id
      - result.set

- name: "[username/password] Set zone ID"
  ansible.builtin.set_fact:
    hosttech_zone_id: "{{ result.zone_id }}"

- name: "[username/password] Ensure that test record is not present"
  community.dns.hosttech_dns_record_set:
    state: present
    zone_name: '{{ test_zone }}'
    record: '{{ test_record }}'
    type: A
    ttl: 300
    value: []
    hosttech_username: '{{ hosttech_username }}'
    hosttech_password: '{{ hosttech_password }}'

- name: "[username/password] Run tests with cleanup"
  block:

    - name: "[username/password] Get test record"
      community.dns.hosttech_dns_record_set_info:
        zone_id: '{{ hosttech_zone_id }}'
        record: '{{ test_record }}'
        type: A
        hosttech_username: '{{ hosttech_username }}'
        hosttech_password: '{{ hosttech_password }}'
      register: rec

    - name: "[username/password] Check results"
      ansible.builtin.assert:
        that:
          - not rec.set

    - name: "[username/password] Create test record"
      community.dns.hosttech_dns_record_set:
        state: present
        zone_name: '{{ test_zone }}'
        record: '{{ test_record }}'
        type: A
        ttl: 300
        value:
          - 1.2.3.4
          - 1.2.3.5
          - 1.2.3.6
        hosttech_username: '{{ hosttech_username }}'
        hosttech_password: '{{ hosttech_password }}'

    - name: "[username/password] Modify test record"
      community.dns.hosttech_dns_record_set:
        state: present
        zone_name: '{{ test_zone }}'
        prefix: '{{ test_record_prefix }}'
        type: A
        ttl: 300
        value:
          - 1.2.3.4
          - 1.2.3.7
        hosttech_username: '{{ hosttech_username }}'
        hosttech_password: '{{ hosttech_password }}'

    - name: "[username/password] Add test record"
      community.dns.hosttech_dns_record:
        state: present
        zone_name: '{{ test_zone }}'
        prefix: '{{ test_record_prefix }}'
        type: A
        ttl: 300
        value: 1.2.3.8
        hosttech_username: '{{ hosttech_username }}'
        hosttech_password: '{{ hosttech_password }}'

    - name: "[username/password] Remove test record"
      community.dns.hosttech_dns_record:
        state: absent
        zone_name: '{{ test_zone }}'
        prefix: '{{ test_record_prefix }}'
        type: A
        ttl: 300
        value: 1.2.3.4
        hosttech_username: '{{ hosttech_username }}'
        hosttech_password: '{{ hosttech_password }}'

    - name: "[username/password] Get test record"
      community.dns.hosttech_dns_record_set_info:
        zone_name: '{{ test_zone }}'
        record: '{{ test_record }}'
        type: A
        hosttech_username: '{{ hosttech_username }}'
        hosttech_password: '{{ hosttech_password }}'
      register: rec

    - name: "[username/password] Check results"
      ansible.builtin.assert:
        that:
          - rec.set
          - rec.set.record == test_record
          - rec.set.type == 'A'
          - rec.set.ttl == 300
          - rec.set.value | length == 2
          - rec.set.value | sort == ['1.2.3.7', '1.2.3.8']

    - name: "[username/password] Delete test record"
      community.dns.hosttech_dns_record_set:
        state: absent
        zone_id: '{{ hosttech_zone_id }}'
        record: '{{ rec.set.record }}'
        ttl: '{{ rec.set.ttl }}'
        type: '{{ rec.set.type }}'
        value: '{{ rec.set.value }}'
        on_existing: keep_and_fail
        hosttech_username: '{{ hosttech_username }}'
        hosttech_password: '{{ hosttech_password }}'

  always:
    - name: "[username/password] Ensure that test record is not present"
      community.dns.hosttech_dns_record_set:
        state: absent
        zone_name: '{{ test_zone }}'
        record: '{{ test_record }}'
        type: A
        ttl: 300
        hosttech_username: '{{ hosttech_username }}'
        hosttech_password: '{{ hosttech_password }}'
