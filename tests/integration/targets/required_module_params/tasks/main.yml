- name: Run community.dns.hetzner_dns_record without options
  community.dns.hetzner_dns_record:  # noqa: args[module]
  register: result
  failed_when: result is not failed

- name: Validate community.dns.hetzner_dns_record run
  ansible.builtin.assert:
    that:
      - "'state' in result.msg"
      - "'type' in result.msg"
      - "'value' in result.msg"

