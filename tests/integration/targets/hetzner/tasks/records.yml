- name: Basic tests for records
  block:
    - name: Test graceful error handling
      community.dns.hetzner_dns_record:
        zone_name: none_existing
        prefix: dns_ansible_collection
        state: present
        value: "osuv.de."
        type: CNAME
        ttl: 300
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD
      failed_when: RECORD is not failed

    - name: Verify graceful error handling
      ansible.builtin.assert:
        that:
          - RECORD is not changed
          - 'RECORD.msg == "Zone not found"'

    - name: Fetch zone info
      community.dns.hetzner_dns_zone_info:
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: ZONES

    - name: Fetch zone info must also work in check_mode
      community.dns.hetzner_dns_zone_info:
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      check_mode: true
      register: ZONES

    - name: Add record
      community.dns.hetzner_dns_record:
        zone_id: "{{ ZONES.zone_id }}"
        prefix: dns_ansible_collection
        state: present
        value: "{{ hetzner_test_zone }}."
        type: CNAME
        ttl: 300
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Assert add record 1
      ansible.builtin.assert:
        that:
          - RECORD is changed
          # - RECORD.record_set_info.record.ttl == 300
          # - RECORD.record_set_info | count == 1

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: dns_ansible_collection
        type: CNAME
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Show record set
      ansible.builtin.debug:
        msg: "{{ RECORD }}"

    - name: Assert add record 2
      ansible.builtin.assert:
        that:
          - RECORD.set.ttl == 300
          - RECORD.set.type == 'CNAME'
          - RECORD.set.value == [hetzner_test_zone ~ "."]

    - name: Fetch record info must also work in check_mode
      community.dns.hetzner_dns_record_set_info:
        prefix: dns_ansible_collection
        type: CNAME
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      check_mode: true

    - name: Add record no change
      community.dns.hetzner_dns_record:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        state: present
        value: "{{ hetzner_test_zone }}."
        type: CNAME
        ttl: 300
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD
      diff: true

    - name: Show record set
      ansible.builtin.debug:
        var: RECORD

    - name: Assert add record no change
      ansible.builtin.assert:
        that:
          - RECORD is not changed
          - RECORD.diff.before.ttl == 300
          - RECORD.diff.after.ttl == 300
          - RECORD.diff.after.value == hetzner_test_zone ~ '.'

    - name: Modify record change in check_mode
      community.dns.hetzner_dns_record:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        state: present
        value: "{{ hetzner_test_zone }}."
        type: CNAME
        ttl: 60
        hetzner_token: "{{ hetzner_token }}"
      check_mode: true
      register: RECORD
      diff: true

    - name: Assert change record check_mode
      ansible.builtin.assert:
        that:
          - RECORD is changed
          - RECORD.diff.before.ttl == 300
          - RECORD.diff.after.ttl == 60
          - RECORD.diff.after.value == hetzner_test_zone ~ '.'

    - name: Modify record change
      community.dns.hetzner_dns_record:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        state: present
        value: "{{ hetzner_test_zone }}."
        type: CNAME
        ttl: 60
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD
      diff: true

    - name: Assert change record
      ansible.builtin.assert:
        that:
          - RECORD is changed
          - RECORD.diff.before.ttl == 300
          - RECORD.diff.after.ttl == 60
          - RECORD.diff.after.value == hetzner_test_zone ~ '.'

    - name: Delete record
      community.dns.hetzner_dns_record:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        type: CNAME
        value: "{{ hetzner_test_zone }}."
        state: absent
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Assert delete record
      ansible.builtin.assert:
        that:
          - RECORD is changed

    - name: Delete record no change
      community.dns.hetzner_dns_record:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        type: CNAME
        value: "{{ hetzner_test_zone }}."
        state: absent
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Assert delete record
      ansible.builtin.assert:
        that:
          - RECORD is not changed

    - name: Add single A record
      community.dns.hetzner_dns_record:
        zone_id: "{{ ZONES.zone_id }}"
        prefix: dns_ansible_collection
        state: present
        value: 1.1.1.1
        type: A
        ttl: 60
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Append A record
      community.dns.hetzner_dns_record:
        zone_id: "{{ ZONES.zone_id }}"
        prefix: dns_ansible_collection
        state: present
        value: 8.8.8.8
        type: A
        ttl: 60
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Append A record
      community.dns.hetzner_dns_record:
        zone_id: "{{ ZONES.zone_id }}"
        prefix: dns_ansible_collection
        state: present
        value: 8.8.4.4
        type: A
        ttl: 60
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: dns_ansible_collection
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Assert 3 A records
      ansible.builtin.assert:
        that:
          - RECORD.set.value | count == 3

    - name: Delete single A record
      community.dns.hetzner_dns_record:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        state: absent
        value: 8.8.8.8
        type: A
        hetzner_token: "{{ hetzner_token }}"

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: dns_ansible_collection
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Assert 2 A records
      ansible.builtin.assert:
        that:
          - RECORD.set.value | count == 2

    - name: Delete another A records
      community.dns.hetzner_dns_record:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        state: absent
        value: 8.8.4.4
        type: A
        hetzner_token: "{{ hetzner_token }}"

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: dns_ansible_collection
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Assert 1 A records
      ansible.builtin.assert:
        that:
          - RECORD.set.value | count == 1

    - name: Delete last A records
      community.dns.hetzner_dns_record:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        state: absent
        value: 1.1.1.1
        type: A
        hetzner_token: "{{ hetzner_token }}"

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: dns_ansible_collection
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Assert 0 A records
      ansible.builtin.assert:
        that:
          - RECORD.set == {}

    - name: Add record
      community.dns.hetzner_dns_record:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: website1
        state: present
        type: A
        value: 127.0.0.1
        hetzner_token: "{{ hetzner_token }}"

    - name: Append record website1
      community.dns.hetzner_dns_record:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: website1
        state: present
        type: A
        value: 127.0.0.2
        hetzner_token: "{{ hetzner_token }}"

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: website1
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Assert 2 A record
      ansible.builtin.assert:
        that:
          - RECORD.set.value | count == 2

    - name: Delete first record for website1
      community.dns.hetzner_dns_record:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: website1
        state: absent
        type: A
        value: 127.0.0.1
        hetzner_token: "{{ hetzner_token }}"

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: website1
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: RECORD

    - name: Assert 1 A records
      ansible.builtin.assert:
        that:
          - RECORD.set.value | count == 1

  always:
    - name: Always delete CNAME record
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        type: CNAME
        state: present
        value: []
        hetzner_token: "{{ hetzner_token }}"

    - name: Always delete A record
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        type: A
        state: present
        value: []
        hetzner_token: "{{ hetzner_token }}"

    - name: Always delete A record
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: website1
        type: A
        state: present
        value: []
        hetzner_token: "{{ hetzner_token }}"
