- name: Basic tests for record sets
  block:
    - name: Test graceful error handling
      community.dns.hetzner_dns_record_set:
        zone_name: none_existing
        prefix: dns_ansible_collection
        state: present
        value: "osuv.de."
        type: CNAME
        ttl: 300
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result
      failed_when: record_set_result is not failed

    - name: Verify graceful error handling
      ansible.builtin.assert:
        that:
          - record_set_result is not changed
          - 'record_set_result.msg == "Zone not found"'

    - name: Make sure that CNAME record isn't there
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        type: CNAME
        state: present
        value: []
        hetzner_token: "{{ hetzner_token }}"

    - name: Make sure that A record isn't there
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        type: A
        state: present
        value: []
        hetzner_token: "{{ hetzner_token }}"

    - name: Make sure that A record isn't there
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: website1
        type: A
        state: present
        value: []
        hetzner_token: "{{ hetzner_token }}"

    - name: Fetch zone info
      community.dns.hetzner_dns_zone_info:
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: zones_result

    - name: Fetch zone info must also work in check_mode
      community.dns.hetzner_dns_zone_info:
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      check_mode: true
      register: zones_result

    - name: Add record
      community.dns.hetzner_dns_record_set:
        zone_id: "{{ zones_result.zone_id }}"
        prefix: dns_ansible_collection
        state: present
        value: "{{ hetzner_test_zone }}."
        type: CNAME
        ttl: 300
        hetzner_token: "{{ hetzner_token }}"
        on_existing: keep_and_fail
      register: record_set_result

    - name: Assert add record 1
      ansible.builtin.assert:
        that:
          - record_set_result is changed
          # - record_set_result.record_set_info.record.ttl == 300
          # - record_set_result.record_set_info | count == 1

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: dns_ansible_collection
        type: CNAME
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Show record
      ansible.builtin.debug:
        msg: "{{ record_set_result }}"

    - name: Assert add record 2
      ansible.builtin.assert:
        that:
          - record_set_result.set.ttl == 300
          - record_set_result.set.type == 'CNAME'
          - record_set_result.set.value == [hetzner_test_zone ~ "."]

    - name: Fetch record info must also work in check_mode
      community.dns.hetzner_dns_record_set_info:
        prefix: dns_ansible_collection
        type: CNAME
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      check_mode: true

    - name: Add record no change
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        state: present
        value: "{{ hetzner_test_zone }}."
        type: CNAME
        ttl: 300
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result
      diff: true

    - name: Show record
      ansible.builtin.debug:
        var: record_set_result

    - name: Assert add record no change
      ansible.builtin.assert:
        that:
          - record_set_result is not changed
          - record_set_result.diff.before.ttl == 300
          - record_set_result.diff.after.ttl == 300
          - record_set_result.diff.after.value | count == 1

    - name: Modify record change in check_mode
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        state: present
        value: "{{ hetzner_test_zone }}."
        type: CNAME
        ttl: 60
        hetzner_token: "{{ hetzner_token }}"
      check_mode: true
      register: record_set_result
      diff: true

    - name: Assert change record check_mode
      ansible.builtin.assert:
        that:
          - record_set_result is changed
          - record_set_result.diff.before.ttl == 300
          - record_set_result.diff.after.ttl == 60
          - record_set_result.diff.after.value | count == 1

    - name: Modify record change
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        state: present
        value: "{{ hetzner_test_zone }}."
        type: CNAME
        ttl: 60
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result
      diff: true

    - name: Assert change record
      ansible.builtin.assert:
        that:
          - record_set_result is changed
          - record_set_result.diff.before.ttl == 300
          - record_set_result.diff.after.ttl == 60
          - record_set_result.diff.after.value | count == 1

    - name: Delete record
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        type: CNAME
        state: absent
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Assert delete record
      ansible.builtin.assert:
        that:
          - record_set_result is changed

    - name: Delete record no change
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        type: CNAME
        state: absent
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Assert delete record
      ansible.builtin.assert:
        that:
          - record_set_result is not changed

    - name: Add single A record
      community.dns.hetzner_dns_record_set:
        zone_id: "{{ zones_result.zone_id }}"
        prefix: dns_ansible_collection
        state: present
        value:
          - 1.1.1.1
        type: A
        ttl: 60
        on_existing: keep_and_fail
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Append A record
      community.dns.hetzner_dns_record_set:
        zone_id: "{{ zones_result.zone_id }}"
        prefix: dns_ansible_collection
        state: present
        value:
          - 1.1.1.1
          - 8.8.8.8
        type: A
        ttl: 60
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Append A record
      community.dns.hetzner_dns_record_set:
        zone_id: "{{ zones_result.zone_id }}"
        prefix: dns_ansible_collection
        state: present
        value:
          - 1.1.1.1
          - 8.8.8.8
          - 8.8.4.4
        type: A
        ttl: 60
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: dns_ansible_collection
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Assert 3 A records
      ansible.builtin.assert:
        that:
          - record_set_result.set.value | count == 3

    - name: Delete single A record
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        state: present
        value:
          - 1.1.1.1
          - 8.8.4.4
        type: A
        hetzner_token: "{{ hetzner_token }}"

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: dns_ansible_collection
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Assert 2 A records
      ansible.builtin.assert:
        that:
          - record_set_result.set.value | count == 2

    - name: Delete all A records
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        type: A
        state: absent
        hetzner_token: "{{ hetzner_token }}"

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: dns_ansible_collection
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Assert 0 A records
      ansible.builtin.assert:
        that:
          - record_set_result.set == {}

    - name: Add record
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: website1
        state: present
        type: A
        value:
          - 127.0.0.1
        on_existing: keep_and_fail
        hetzner_token: "{{ hetzner_token }}"

    - name: Replace record
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: website1
        state: present
        type: A
        value:
          - 127.0.0.2
        hetzner_token: "{{ hetzner_token }}"

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: website1
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Show record
      ansible.builtin.debug:
        msg: "{{ record_set_result }}"

    - name: Assert 1 A record
      ansible.builtin.assert:
        that:
          - record_set_result.set.ttl is none
          - record_set_result.set.type == 'A'
          - record_set_result.set.value | count == 1
          - record_set_result.set.value[0] == '127.0.0.2'

    - name: Append record website1
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: website1
        state: present
        type: A
        value:
          - 127.0.0.2
          - 127.0.0.1
        hetzner_token: "{{ hetzner_token }}"

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: website1
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Assert 2 A record
      ansible.builtin.assert:
        that:
          - record_set_result.set.value | count == 2

    - name: Replace all
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: website1
        state: present
        type: A
        value:
          - 8.8.8.8
        hetzner_token: "{{ hetzner_token }}"

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: website1
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Assert 1 A record
      ansible.builtin.assert:
        that:
          - record_set_result.set.value | count == 1

    - name: Remove all records website1
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: website1
        type: A
        state: absent
        hetzner_token: "{{ hetzner_token }}"

    - name: Fetch record info
      community.dns.hetzner_dns_record_set_info:
        prefix: website1
        type: A
        zone_name: "{{ hetzner_test_zone }}"
        hetzner_token: "{{ hetzner_token }}"
      register: record_set_result

    - name: Assert 0 A records
      ansible.builtin.assert:
        that:
          - record_set_result.set == {}

  always:
    - name: Always delete CNAME record
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        type: CNAME
        state: present
        value: []
        hetzner_token: "{{ hetzner_token }}"

    - name: Always delete A record
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: dns_ansible_collection
        type: A
        state: present
        value: []
        hetzner_token: "{{ hetzner_token }}"

    - name: Always delete A record
      community.dns.hetzner_dns_record_set:
        zone_name: "{{ hetzner_test_zone }}"
        prefix: website1
        type: A
        state: present
        value: []
        hetzner_token: "{{ hetzner_token }}"
